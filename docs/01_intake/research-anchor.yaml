# ─── Expert Persona ───────────────────────────────────────────────
expert_persona: >
  Senior computational population geneticist specializing in archaic introgression
  and human evolutionary history. Deep expertise in ancient DNA analysis,
  coalescent theory, haplotype-based introgression detection, and large-scale
  genomic data analysis (1000GP, HGDP, SGDP, Allen Ancient DNA Resource).
  Reviewer lens: biological mechanism chains, alternative hypothesis exclusion,
  batch effects, ascertainment bias in ancient DNA, replication across populations,
  functional enrichment of introgressed loci.

reviewer_focus:
  - Novel biology: mechanism chains linking introgressed variants to phenotype/function
  - Alternative hypothesis exclusion: ILS (incomplete lineage sorting) vs true introgression
  - Ascertainment bias in ancient DNA and SNP arrays
  - Replication across independent datasets and populations
  - Batch effects and contamination controls in ancient samples
  - Benchmarking against ADMIXTOOLS, MOSAIC, Sprime, ArchIE, etc.
  - Functional enrichment and selection analysis of introgressed segments

# ─── Research Strategy ────────────────────────────────────────────
method_direction: "Li & Stephens haplotype matching framework extended to archaic genomes — NOT deep learning"
method_rationale: >
  Deep learning rejected: limited demonstrated success in this domain; demographic
  misspecification is a major confounder for all simulation-trained DL methods
  (Peede et al. 2025 review); lacks theoretical guarantees; expert knowledge
  not naturally incorporated.
  
  Chosen approach: extend the Li & Stephens (2003) probabilistic haplotype
  matching model to include archaic genomes (Neanderthal/Denisovan) as reference
  panel members. Emission probabilities derived from coalescent theory (match
  length distributions under H_introgressed vs H_AMH differ 11x due to
  t_admixture vs t_split). Transitions from recombination rates. Parameters
  have explicit biological interpretations. Scalable via PBWT-based sparse
  haplotype matching (as demonstrated by SparsePainter for modern LAI).
  Multi-source handled naturally by competing HMM states per archaic source.

motivation: >
  Existing tools ignore haplotype match length signal: HMMix/DAIseg use only
  variant density (Poisson emission), discarding all LD structure. A coalescent-
  theoretic haplotype matching model captures an 11x signal difference between
  introgressed and non-introgressed positions. Li & Stephens framework has
  never been applied to archaic introgression; SparsePainter showed PBWT-based
  implementation scales to biobank size for modern LAI. This combination is
  genuinely novel, expert-knowledge-driven, and fills the explicit gap stated
  by Peede et al. 2025.

target_contribution:
  - primary: "Novel computational method/software for archaic introgression analysis (Li & Stephens extension)"
  - secondary: "New biological discoveries about Denisovan/Neanderthal inheritance in modern humans, especially AMR"

# ─── Phase 2 Validation (Problem Validation) ──────────────────────────────
phase2_completed: true
validated_research_question: >
  Develop ArchaicPainter: a Li & Stephens haplotype matching method extended
  to archaic reference genomes (Neanderthal + Denisovan), using coalescent-
  theoretic emission probabilities (expected match length 58kb under
  introgression vs 5kb under AMH ancestry — 11x signal difference ignored
  by all existing tools). Multi-source HMM (AMH | NEA | DEN), validated on
  msprime simulations with known ground truth, outperforming IBDmix/HMMix/
  DAIseg on short introgressed segments (<50kb). Applied to 2,504 1000GP
  individuals: genome-wide introgression atlas + analysis of admixed American
  populations where complex background admixture confounds existing methods.
  Open-source Python/C++ software. Ghost archaic deferred to version 2.

project_intent:
  primary: "Quality (principled, theoretically-grounded method) + Discovery (biology)"
  secondary: "Engineering (open-source tool)"

venue_target:
  primary: "Genome Biology"
  fallback: "Molecular Biology and Evolution"
  stretch: "Nature Methods (if results are exceptional)"
  rationale: >
    Genome Biology accepts Type H (method + discovery); key differentiation
    from Liang et al. 2025 is haplotype match length signal vs IBDmix variant
    density. Must show: (1) synthetic benchmark superiority on short segments;
    (2) complementary findings in AMR populations not detectable by IBDmix.

