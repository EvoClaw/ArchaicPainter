    Professor CONDITIONAL (theory derivation, baselines, AMR framing, scalability);
    Editor CONDITIONAL (overlap with Liang 2025, synthetic benchmark, biological novelty);
    Scientist CONDITIONAL (unphased archaic emission, PBWT scope, defer ghost, AMR two-phase).
  round2: >
